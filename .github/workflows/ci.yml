name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies (with dev group)
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check src gui tests

      - name: Unit tests (pytest)
        run: uv run pytest -q
